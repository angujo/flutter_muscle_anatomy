name: flutter_muscle_anatomy
description: "A flutter library for showing muscle anatomy, shows for both male and female body types with front and back view. It allows separation between left and right muscles."
version: 1.0.0
repository: "https://github.com/angujo/flutter_muscle_anatomy.git"
homepage: "https://github.com/angujo/flutter_muscle_anatomy.git"
issue_tracker: "https://github.com/angujo/flutter_muscle_anatomy/issues?q=is%3Aissue%20state%3Aopen"


environment:
  sdk: ^3.10.7
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  vector_math: ^2.2.0
  xml: ^6.6.1
  path_drawing: ^1.0.1
  collection: ^1.19.1
  easy_localization: ^3.0.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  assets:
    - assets/male_front.svg
    - assets/female_front.svg
    - assets/male_back.svg
    - assets/female_back.svg
    - assets/translations/


  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
