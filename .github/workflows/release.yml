name: Flutter Package Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write # Critical for secure OIDC token handshake

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # 1. Add the official Dart action to provision OIDC tokens
      - name: Setup Dart Environment
        uses: dart-lang/setup-dart@v1

      # 2. Keep the Flutter setup right after
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project source
        run: flutter analyze

      - name: Validate package
        run: flutter pub publish --dry-run

      # 3. Publish using dart pub publish (which hooks natively into setup-dart's OIDC context)
      - name: Publish package to pub.dev
        run: dart pub publish --force

      # Optional: Auto-create a GitHub Release page
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true